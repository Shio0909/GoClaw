# GoClaw 配置文件示例
# 环境变量可用 ${VAR_NAME} 语法引用

server:
  listen: ":8080"  # HTTP API 监听地址（留空则不启动 HTTP API）
  log_level: info   # 日志级别: debug, info, warn, error
  # log_json: true  # JSON 格式日志（适合生产环境 + ELK）

agent:
  provider: minimax         # claude / openai / minimax / mimo / siliconflow
  api_key: ${MINIMAX_API_KEY}
  # base_url: https://api.minimax.chat/v1  # 自动根据 provider 设置
  model: MiniMax-M2.7
  context_length: 128000
  max_step: 25               # Agent 最大工具调用步数（默认 25）
  tool_max_bytes: 30720      # 工具结果最大字节数（默认 30KB）
  # system_prompt: |          # 自定义 system prompt（追加到默认 prompt 后）
  #   你是一个专业的 Python 开发助手。
  #   请用中文回答所有问题。
  # temperature: 0.7          # 采样温度（留空使用模型默认值）
  # max_tokens: 8192          # 最大输出 token 数（留空使用模型默认值）
  # reasoning_effort: high    # 推理力度: low/medium/high（仅 o1/o3 等推理模型）

  # 多 Key 轮换（可选）
  # api_keys:
  #   - key1
  #   - key2

  # 智能模型路由（可选，简单问题用便宜模型）
  # simple_model: deepseek-chat
  # simple_provider: openai
  # simple_base_url: https://api.deepseek.com/v1

gateways:
  http:
    # api_token: ${GOCLAW_API_TOKEN}   # Bearer Token 认证（留空则无需认证）
    cors_origins: ["*"]                 # CORS 允许域名，["*"] 为全部
    session_timeout: 30                 # 会话超时（分钟）
    request_timeout: 300                # 请求超时（秒）
  qq:
    enabled: false
    websocket: ws://127.0.0.1:3001
    self_id: "123456"
    admins: ["789"]
    stickers_dir: ./stickers
    stt:
      base_url: https://api.openai.com/v1
      api_key: ${GOCLAW_STT_API_KEY}
      model: whisper-1

tools:
  # sandbox: /path/to/sandbox    # 文件写入沙箱（可选）
  tavily_key: ${TAVILY_API_KEY}
  # smithery_key: ${SMITHERY_API_KEY}
  skills_dir: skills
  skill_nudge_interval: 8        # 每 N 轮检查是否需要学习新技能

